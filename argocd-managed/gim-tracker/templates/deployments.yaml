---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: group-ironmen-tracker-frontend
spec:
  selector:
    matchLabels:
      app: gim-tracker-frontend
  replicas: 1
  template:
    metadata:
      labels:
        app: gim-tracker-frontend
    spec:
      containers:
        - name: group-ironmen-tracker-frontend
          image: docker.io/chrisleeeee/group-ironmen-tracker-frontend:latest
          ports:
            - containerPort: 4000
          # resources:
          #   requests:
          #     memory: "64Mi"
          #     cpu: "20m"
          #   limits:
          #     memory: "64Mi"
          #     cpu: "20m"
          livenessProbe:
            httpGet:
              path: /
              port: 4000
          env:
            - name: HOST_URL
              value: https://gim-tracker.ninoo.nl
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: group-ironmen-tracker-backend
spec:
  selector:
    matchLabels:
      app: gim-tracker-backend
  replicas: 1
  template:
    metadata:
      labels:
        app: gim-tracker-backend
    spec:
      containers:
        - name: group-ironmen-tracker-backend
          image: docker.io/chrisleeeee/group-ironmen-tracker-backend:latest
          ports:
            - containerPort: 8080
          # resources:
          #   requests:
          #     memory: "64Mi"
          #     cpu: "20m"
          #   limits:
          #     memory: "64Mi"
          #     cpu: "20m"
          livenessProbe:
            httpGet:
              path: /api/ge-prices
              port: 8080
          env:
            - name: PG_USER
              valueFrom:
                secretKeyRef:
                  name: gim-tracker-cluster-app
                  key: user
            - name: PG_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: gim-tracker-cluster-app
                  key: password
            - name: PG_HOST
              valueFrom:
                secretKeyRef:
                  name: gim-tracker-cluster-app
                  key: host
            - name: PG_PORT
              valueFrom:
                secretKeyRef:
                  name: gim-tracker-cluster-app
                  key: port
            - name: PG_DB
              valueFrom:
                secretKeyRef:
                  name: gim-tracker-cluster-app
                  key: dbname
            - name: BACKEND_SECRET
              valueFrom:
                secretKeyRef:
                  name: gim-tracker
                  key: backend-secret